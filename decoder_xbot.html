<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>VideoCode v2.6 - Xbot Soldier</title>
    <style>body{margin:0;overflow:hidden;background:#1a1a1a;color:#fff;font-family:Arial;}canvas{display:block;width:100vw;height:100vh;}#ui{position:absolute;top:10px;left:10px;z-index:10;background:rgba(0,0,0,0.7);padding:10px;border-radius:8px;}button{padding:8px 16px;background:#2196F3;color:white;border:none;border-radius:4px;cursor:pointer;margin-right:5px;}</style>
</head>
<body>
    <div id="ui">
        <button id="connectBtn">连接服务器</button>
        <button id="disconnectBtn" style="background:#f44336;display:none;">断开连接</button>
        <span id="status">状态: 未连接</span>
        <div id="debug-info" style="margin-top:10px;font-size:12px;color:#aaa;">等待数据...</div>
    </div>
    <canvas id="canvas"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        const scene=new THREE.Scene();scene.background=new THREE.Color(0x2C3E50);
        const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,100);camera.position.set(0,1.6,2);
        const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);
        scene.add(new THREE.DirectionalLight(0xffffff,1));scene.add(new THREE.AmbientLight(0x606060));
        let headModel=null;let headBone=null;
        new THREE.GLTFLoader().load('/models/Xbot.glb',(gltf)=>{
            headModel=gltf.scene;headModel.scale.set(0.6,0.6,0.6);headModel.position.y=-1;scene.add(headModel);
            // 添加坐标轴辅助 (红=X, 绿=Y, 蓝=Z)
            const axesHelper = new THREE.AxesHelper(2);
            scene.add(axesHelper);
            headModel.traverse((o)=>{if(o.isBone&&o.name.includes('Head'))headBone=o;});
            document.getElementById('debug-info').textContent=headBone?`Xbot loaded. Head: ${headBone.name}`:"Xbot loaded (No Head Bone)";
        },undefined,(err)=>{document.getElementById('debug-info').textContent="Load failed";});
        let ws;
        document.getElementById('disconnectBtn').addEventListener('click',()=>{if(ws)ws.close();});
        document.getElementById('connectBtn').addEventListener('click',()=>{
            ws=new WebSocket('wss://vc.aitomoney.online/ws?role=decoder');
            ws.onopen=()=>{document.getElementById('status').textContent="Connected";document.getElementById('connectBtn').style.display='none';document.getElementById('disconnectBtn').style.display='inline-block';};
            ws.onmessage=async(e)=>{try{let d=e.data instanceof Blob?await e.data.text():e.data;const data=JSON.parse(d);if(data.d&&Array.isArray(data.d)&&data.d.length>2){const x=parseFloat(data.d[0]);const y=parseFloat(data.d[1]);if(headBone){headBone.rotation.y=(x-0.5)*1.5;headBone.rotation.x=(y-0.5)*1.0;}}}catch(err){console.error(err);}};
        });
        function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}animate();
        window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
    </script>
</body>
</html>
