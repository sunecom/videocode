<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>VideoCode v2.9 - Expressive Face</title>
    <style>body{margin:0;overflow:hidden;background:#1a1a1a;color:#fff;font-family:Arial;}canvas{display:block;width:100vw;height:100vh;}#ui{position:absolute;top:10px;left:10px;z-index:10;background:rgba(0,0,0,0.7);padding:10px;border-radius:8px;}button{padding:8px 16px;background:#2196F3;color:white;border:none;border-radius:4px;cursor:pointer;margin-right:5px;}</style>
</head>
<body>
    <div id="ui">
        <button id="connectBtn">连接服务器</button>
        <button id="disconnectBtn" style="background:#f44336;display:none;">断开连接</button>
        <span id="status">状态: 未连接</span>
        <div id="debug-info" style="margin-top:10px;font-size:12px;color:#aaa;">等待数据...</div>
    </div>
    <canvas id="canvas"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <!-- VideoCode Standard Parser Logic (Inline for stability) -->
    <script>
        class VideoCodeParser {
            constructor(model) { this.model = model; }
            applySchema(schema) {
                if (!this.model) return;
                // 1. 驱动姿态 (Pose)
                if (schema.pose && schema.pose.head) {
                    this.model.rotation.x = schema.pose.head.rotation.x;
                    this.model.rotation.y = schema.pose.head.rotation.y;
                    this.model.rotation.z = schema.pose.head.rotation.z;
                }
                // 2. 驱动表情 (Expression) - 针对卡通头的简化映射
                if (schema.expression) {
                    const mouth = this.model.getObjectByName('mouth');
                    if (mouth && schema.expression.mouth_open !== undefined) {
                        mouth.scale.y = 1 + schema.expression.mouth_open * 15;
                    }
                    // 可以在这里扩展更多表情映射
                }
            }
        }
    </script>
    <script>
        const scene=new THREE.Scene();scene.background=new THREE.Color(0x2C3E50);
        const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,100);camera.position.set(0,0,3.5);
        const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);
        const light=new THREE.DirectionalLight(0xffffff,1);light.position.set(5,5,5);scene.add(light);scene.add(new THREE.AmbientLight(0x606060));
        const headGroup = new THREE.Group();
        const face = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.3 }));
        headGroup.add(face);
        const eyeGeo = new THREE.SphereGeometry(0.22, 32, 32);
        const eyeWhite = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        function createEye(x) {
            const group = new THREE.Group();
            const white = new THREE.Mesh(eyeGeo, eyeWhite);
            const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), pupilMat);
            pupil.position.z = 0.18;
            const highlight = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            highlight.position.set(0.05, 0.05, 0.2);
            group.add(white, pupil, highlight);
            group.position.set(x, 0.25, 0.85);
            return group;
        }
        const leftEye = createEye(-0.35);
        const rightEye = createEye(0.35);
        headGroup.add(leftEye, rightEye);
        const nose = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), new THREE.MeshStandardMaterial({ color: 0xeebb99 }));
        nose.position.set(0, -0.05, 1.05);
        headGroup.add(nose);
        // 眉毛 (棕色长条)
        const browGeo = new THREE.BoxGeometry(0.3, 0.06, 0.05);
        const browMat = new THREE.MeshStandardMaterial({ color: 0x885533 });
        const leftBrow = new THREE.Mesh(browGeo, browMat); leftBrow.position.set(-0.35, 0.55, 0.9); headGroup.add(leftBrow);
        const rightBrow = new THREE.Mesh(browGeo, browMat); rightBrow.position.set(0.35, 0.55, 0.9); headGroup.add(rightBrow);

        const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 0.1), new THREE.MeshStandardMaterial({ color: 0xcc8888 }));
        mouth.name = 'mouth'; // 给嘴巴起个名字，方便解析器查找
        mouth.position.set(0, -0.45, 0.95);
        headGroup.add(mouth);
        scene.add(headGroup);
        
        // 初始化解析器
        const parser = new VideoCodeParser(headGroup);
        document.getElementById('debug-info').textContent = "Schema v1.0 Parser Ready";

        let ws;
        document.getElementById('disconnectBtn').addEventListener('click', () => { if (ws) ws.close(); });
        document.getElementById('connectBtn').addEventListener('click', () => {
            ws = new WebSocket('wss://vc.aitomoney.online/ws?role=decoder');
            ws.onopen = () => {
                document.getElementById('status').textContent = "Connected";
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('disconnectBtn').style.display = 'inline-block';
            };
            ws.onmessage = async (e) => {
                try {
                    let d = e.data instanceof Blob ? await e.data.text() : e.data;
                    const schema = JSON.parse(d);
                    
                    // 使用标准解析器驱动模型
                    parser.applySchema(schema);

                    // 额外处理：眼睛和眉毛的联动 (Parser 暂未包含此逻辑)
                    if (schema.expression) {
                        const mouthOpen = schema.expression.mouth_open || 0;
                        const blinkScale = 1 - mouthOpen * 2;
                        leftEye.scale.y = blinkScale > 0 ? blinkScale : 0.1;
                        rightEye.scale.y = blinkScale > 0 ? blinkScale : 0.1;
                        const browLift = mouthOpen * 0.2;
                        leftBrow.position.y = 0.55 + browLift;
                        rightBrow.position.y = 0.55 + browLift;
                    }
                } catch (err) { console.error(err); }
            };
        });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
