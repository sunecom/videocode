<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>VideoCode v2.1 - Decoder (With Model)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; color: #fff; font-family: Arial; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
        button { padding: 8px 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="connectBtn">连接服务器</button>
        <button id="disconnectBtn" style="background: #f44336; display: none;">断开连接</button>
        <span id="status">状态: 未连接</span>
        <div id="debug-info" style="margin-top: 10px; font-size: 12px; color: #aaa;">等待数据...</div>
    </div>
    <div id="loading">正在加载 3D 模型...</div>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2C3E50);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 临时立方体
        let currentModel;
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        currentModel = new THREE.Mesh(geometry, material);
        scene.add(currentModel);

        // 加载真实模型
        let headBone = null;
        const loader = new THREE.GLTFLoader();
        document.getElementById('loading').style.display = 'block';
        // 更换为更帅气的 Xbot 模型
        loader.load('https://threejs.org/examples/models/gltf/Xbot.glb', (gltf) => {
            scene.remove(currentModel);
            currentModel = gltf.scene;
            currentModel.scale.set(0.5, 0.5, 0.5);
            currentModel.position.y = -1;
            scene.add(currentModel);
            
            // 调试：打印所有骨骼名称
            const bones = [];
            currentModel.traverse((o) => { if (o.isBone) bones.push(o.name); });
            console.log("Available Bones:", bones);

            // 尝试多种常见的头部骨骼名称
            headBone = currentModel.getObjectByName('mixamorig:Head') || 
                       currentModel.getObjectByName('Head') || 
                       currentModel.getObjectByName('Neck');
            
            if (headBone) {
                console.log("✅ Head bone found:", headBone.name);
            } else {
                console.warn("❌ Head bone not found! Using fallback model rotation.");
            }
            
            document.getElementById('loading').style.display = 'none';
            console.log("Model loaded successfully");
        }, undefined, (error) => {
            console.error("Model load failed, keeping fallback cube:", error);
            document.getElementById('loading').textContent = "模型加载失败，显示备用立方体";
        });

        let ws;
        const statusSpan = document.getElementById('status');
        
        document.getElementById('disconnectBtn').addEventListener('click', () => { if (ws) ws.close(); });
        document.getElementById('connectBtn').addEventListener('click', () => {
            statusSpan.textContent = "正在连接...";
            ws = new WebSocket('wss://vc.aitomoney.online/ws?role=decoder');
            ws.onopen = () => {
                statusSpan.textContent = "✅ 已连接";
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('disconnectBtn').style.display = 'inline-block';
            };
            ws.onclose = () => {
                statusSpan.textContent = "❌ 已断开";
                document.getElementById('connectBtn').style.display = 'inline-block';
                document.getElementById('disconnectBtn').style.display = 'none';
            };
            ws.onmessage = async (event) => {
                try {
                    // 处理 Blob 或 String 类型的消息
                    let dataStr;
                    if (event.data instanceof Blob) {
                        dataStr = await event.data.text();
                    } else {
                        dataStr = event.data;
                    }
                    const data = JSON.parse(dataStr);
                    if (data.d && Array.isArray(data.d) && data.d.length > 0) {
                        // 实时显示收到的数据
                        document.getElementById('debug-info').textContent = `收到数据: X=${data.d[0]}, Y=${data.d[1]}`;

                        // 姿态解算：利用关键点坐标模拟 Yaw (左右) 和 Pitch (上下)
                        const yaw = (parseFloat(data.d[0]) - 0.5) * 1.5; 
                        const pitch = (parseFloat(data.d[1]) - 0.5) * 1.0;
                        
                        if (headBone) {
                            // 驱动头部骨骼 (Lerp 平滑过渡)
                            headBone.rotation.y += (yaw - headBone.rotation.y) * 0.2;
                            headBone.rotation.x += (pitch - headBone.rotation.x) * 0.2;
                        } else {
                            // 没找到骨骼时转整个模型
                            currentModel.rotation.y += (yaw - currentModel.rotation.y) * 0.2;
                            currentModel.rotation.x += (pitch - currentModel.rotation.x) * 0.2;
                        }
                    }
                } catch (e) { console.error(e); }
            };
        });

        function animate() {
            requestAnimationFrame(animate);
            if (currentModel && !ws) { // 没连接时自动转，连接后由数据驱动
                currentModel.rotation.x += 0.01;
                currentModel.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
