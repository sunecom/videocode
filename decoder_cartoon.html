<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>VideoCode v2.7 - Cartoon Head</title>
    <style>body{margin:0;overflow:hidden;background:#1a1a1a;color:#fff;font-family:Arial;}canvas{display:block;width:100vw;height:100vh;}#ui{position:absolute;top:10px;left:10px;z-index:10;background:rgba(0,0,0,0.7);padding:10px;border-radius:8px;}button{padding:8px 16px;background:#2196F3;color:white;border:none;border-radius:4px;cursor:pointer;margin-right:5px;}</style>
</head>
<body>
    <div id="ui">
        <button id="connectBtn">连接服务器</button>
        <button id="disconnectBtn" style="background:#f44336;display:none;">断开连接</button>
        <span id="status">状态: 未连接</span>
        <div id="debug-info" style="margin-top:10px;font-size:12px;color:#aaa;">等待数据...</div>
    </div>
    <canvas id="canvas"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script>
        const scene=new THREE.Scene();scene.background=new THREE.Color(0xffffff); // 白色背景
        const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,100);camera.position.set(0,0,3.5);
        const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);
        scene.add(new THREE.DirectionalLight(0xffffff,1));scene.add(new THREE.AmbientLight(0x606060));

        // --- 高清卡通头 (Cartoon Head) ---
        const headGroup = new THREE.Group();
        
        // 脸 (肤色球体)
        const face = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshBasicMaterial({ color: 0xff0000 })); // 红色球体
        headGroup.add(face);

        // 眼睛 (白眼球 + 黑眼珠 + 高光)
        const eyeGeo = new THREE.SphereGeometry(0.22, 32, 32);
        const eyeWhite = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        
        function createEye(x) {
            const group = new THREE.Group();
            const white = new THREE.Mesh(eyeGeo, eyeWhite);
            const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), pupilMat);
            pupil.position.z = 0.18;
            const highlight = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            highlight.position.set(0.05, 0.05, 0.2);
            group.add(white, pupil, highlight);
            group.position.set(x, 0.25, 0.85);
            return group;
        }
        const leftEye = createEye(-0.35);
        const rightEye = createEye(0.35);
        headGroup.add(leftEye, rightEye);

        // 鼻子 (小圆球)
        const nose = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), new THREE.MeshStandardMaterial({ color: 0xeebb99 }));
        nose.position.set(0, -0.05, 1.05);
        headGroup.add(nose);

        // 嘴巴 (粉色长条，可变形)
        const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 0.1), new THREE.MeshStandardMaterial({ color: 0xcc8888 }));
        mouth.position.set(0, -0.45, 0.95);
        headGroup.add(mouth);

        scene.add(headGroup);
        document.getElementById('debug-info').textContent = "Cartoon Head Ready";

        // WebSocket 逻辑
        let ws;
        document.getElementById('disconnectBtn').addEventListener('click', () => { if (ws) ws.close(); });
        document.getElementById('connectBtn').addEventListener('click', () => {
            ws = new WebSocket('wss://vc.aitomoney.online/ws?role=decoder');
            ws.onopen = () => {
                document.getElementById('status').textContent = "Connected";
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('disconnectBtn').style.display = 'inline-block';
            };
            ws.onmessage = async (e) => {
                try {
                    let d = e.data instanceof Blob ? await e.data.text() : e.data;
                    const data = JSON.parse(d);
                    if (data.d && Array.isArray(data.d) && data.d.length > 2) {
                        const x = parseFloat(data.d[0]);
                        const y = parseFloat(data.d[1]);
                        const mouthOpen = parseFloat(data.d[2]) || 0;
                        
                        // 头部转动 + 平移
                        headGroup.rotation.y = (x - 0.5) * 1.5;
                        headGroup.rotation.x = (y - 0.5) * 1.0;
                        headGroup.position.x = (x - 0.5) * 0.5;
                        headGroup.position.y = (y - 0.5) * 0.3;

                        // 嘴巴开合
                        mouth.scale.y = 1 + mouthOpen * 15;

                        // 眼睛跟随
                        leftEye.children[1].position.x = (x - 0.5) * 0.1;
                        rightEye.children[1].position.x = (x - 0.5) * 0.1;
                    }
                } catch (err) { console.error(err); }
            };
        });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
