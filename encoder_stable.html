<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>VideoCode v2.1 - Encoder (Stable)</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #1a1a1a; color: #fff; }
        video, canvas { border: 2px solid #333; width: 640px; height: 480px; background: #000; display: block; margin-top: 10px; }
        .stats { margin-top: 20px; padding: 15px; background: #2a2a2a; border-radius: 8px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        select { padding: 5px; margin-left: 10px; background: #333; color: #fff; }
    </style>
</head>
<body>
    <h1>🎥 VideoCode v2.1 - Encoder (Stable)</h1>
    <div>
        <button id="startBtn">启动摄像头</button>
        <button id="connectBtn" disabled>连接服务器</button>
    </div>
    <div style="margin: 15px 0;">
        <label>L2 纹理:</label>
        <select id="charSelect"><option value="char_male_01">商务男士</option><option value="char_female_01">职业女士</option></select>
        <select id="bgSelect"><option value="bg_office">办公室</option><option value="bg_studio">摄影棚</option></select>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    <div class="stats" id="status">状态: 等待启动...</div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        let faceMesh, camera, ws, prevLandmarks = null;

        function onResults(results) {
            ctx.drawImage(results.image, 0, 0, 640, 480);
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                // 绘制关键点
                ctx.fillStyle = '#00FF00';
                for (let i = 0; i < landmarks.length; i++) {
                    const x = landmarks[i].x * 640;
                    const y = landmarks[i].y * 480;
                    ctx.beginPath(); ctx.arc(x, y, 2, 0, 2 * Math.PI); ctx.fill();
                }
                // 发送数据
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const packet = {
                        v: "1.1", t: Date.now(),
                        f: [0, 10, 20], d: [0.5, 0.5, 0, 0.6, 0.5, 0, 0.5, 0.6, 0], // 简化示例数据
                        tex: { c: document.getElementById('charSelect').value, b: document.getElementById('bgSelect').value }
                    };
                    ws.send(JSON.stringify(packet));
                }
            }
        }

        document.getElementById('startBtn').addEventListener('click', async () => {
            statusDiv.textContent = "正在启动...";
            faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            faceMesh.onResults(onResults);
            camera = new Camera(video, { onFrame: async () => { await faceMesh.send({ image: video }); }, width: 640, height: 480 });
            await camera.start();
            statusDiv.textContent = "摄像头已启动";
            document.getElementById('connectBtn').disabled = false;
        });

        document.getElementById('connectBtn').addEventListener('click', () => {
            ws = new WebSocket('wss://vc.aitomoney.online/ws?role=encoder');
            ws.onopen = () => { statusDiv.textContent = "✅ 已连接"; };
            ws.onerror = () => { statusDiv.textContent = "❌ 连接失败"; };
        });
    </script>
</body>
</html>
